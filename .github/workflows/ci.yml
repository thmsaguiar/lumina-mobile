name: ✅ CI — Lint, Type Check & Tests

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

jobs:
  lint-typecheck-test:
    name: Lint, Type Check & Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 TypeScript type check
        run: npm run typecheck

      - name: 🧹 ESLint
        run: npm run lint

      - name: 🧪 Tests
        run: npm run test
